<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Stopwatch</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <header>
      <h1>Stopwatch</h1>
      <p class="subtitle">Every second, accounted for.</p>
    </header>

    <div class="dial-wrap">
      <svg class="dial" viewBox="0 0 200 200" aria-hidden="true">
        <circle class="dial-track" cx="100" cy="100" r="86" />
        <circle class="dial-progress" id="dialProgress" cx="100" cy="100" r="86" />
      </svg>
      <div class="time-display" id="timeDisplay" role="timer" aria-live="off">00:00.00</div>
    </div>

    <div class="controls">
      <button type="button" class="btn ghost" id="leftBtn" disabled>Lap</button>
      <button type="button" class="btn primary" id="rightBtn">Start</button>
    </div>

    <ul class="lap-list" id="lapList"></ul>
    <p class="empty-state" id="emptyState">Laps will show up here once you start timing.</p>
  </main>

  <script src="script.js"></script>
</body>
</html>
